name: Test Failure Detector

on:
  schedule:
    # EDIT BEFORE PR: Run daily at 23:00 UTC — after the Daily CI (begins at 00:00 UTC and usually does not go over 8 hours), may adjust this timing later
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to scan (default: BChan-0/valkey, change to valkey-io later)" # EDIT BEFORE PR
        required: false
        type: string
        default: "BChan-0/valkey" # EDIT BEFORE PR
      run_id:
        description: "Specific workflow run ID to analyze (empty = latest completed Daily run)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Parse and report only — don't create/update issues"
        required: false
        default: false
        type: boolean

permissions: 
  contents: read
  issues: write

jobs:
  detect-failures:
    name: "Detect test failures"
    if: >  # EDIT BEFORE PR
      (github.event_name == 'workflow_dispatch' || 
      github.repository == 'BChan-0/valkey-ci-agent')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out agent repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate GitHub App token
        id: generate-token
        continue-on-error: true # EDIT BEFORE PR: once migrated, token will always be on valkey-io so no need for fallback
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.VALKEYRIE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io

      - name: Run test failure detector
        env:
          TARGET_TOKEN: ${{ steps.generate-token.outputs.token || secrets.TARGET_PAT }}  # EDIT BEFORE PR: once migrated, no need for PAT fallback
          TARGET_REPO: ${{ inputs.repo || 'BChan-0/valkey' }} # EDIT BEFORE PR
          RUN_ID: ${{ inputs.run_id || '' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && 'true' || 'false' }} 
        run: |
          set -euo pipefail
          args=(
            -m scripts.test_failure_detector.main
            --token "${TARGET_TOKEN}"
            --repo "${TARGET_REPO}"
            --verbose
          )

          if [[ -n "${RUN_ID}" ]]; then
            args+=(--run-id "${RUN_ID}")
          fi

          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi

          python "${args[@]}"
