name: Test Failure Detector

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to scan (default: valkey-io/valkey)"
        required: false
        type: string
        default: "valkey-io/valkey"
      run_id:
        description: "Specific workflow run ID to analyze (empty = latest completed Daily run)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Parse and report only — don't create/update issues"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  detect-failures:
    name: "Detect test failures"
    if: >
      (github.event_name == 'workflow_dispatch' ||
      github.repository == 'BChan-0/valkey-ci-agent')
    runs-on: ubuntu-latest
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # FORK TEST — DELETE this step before moving back to valkey-io/valkey-ci-agent.
      # The fork has no VALKEYRIE_BOT_* secrets, so the App-token step below fails.
      # Use the fork's TARGET_PAT (a classic/fine-grained PAT with actions:read +
      # issues:write on the TARGET_REPO) as the cross-repo token instead, matching
      # how this repo's other agent workflows fall back on the fork.
      - name: Use TARGET_PAT (fork test)
        id: generate-token
        run: echo "token=${{ secrets.TARGET_PAT }}" >> "$GITHUB_OUTPUT"
      # === end FORK TEST ===

      # EDIT BEFORE PR: Restore this App-token step (uncomment) and DELETE the
      # "Use TARGET_PAT (fork test)" step above. Downstream reads
      # steps.generate-token.outputs.token, so no other change is needed.
      # - name: Generate GitHub App token
      #   id: generate-token
      #   uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
      #   with:
      #     app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
      #     private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
      #     owner: valkey-io
      #     repositories: valkey
      #     permission-actions: read
      #     permission-issues: write
      #     permission-metadata: read

      - name: Run test failure detector
        env:
          TARGET_TOKEN: ${{ steps.generate-token.outputs.token }}
          # FORK TEST: scan the fork's own Daily runs on schedule (TARGET_PAT only
          # has access to the fork). Restore 'valkey-io/valkey' before moving back.
          TARGET_REPO: ${{ inputs.repo || 'BChan-0/valkey' }}
          # FORK TEST: the fork's Daily runs are triggered on the 'test-workflow'
          # branch, not 'unstable', so scan that branch. DELETE before moving back
          # to valkey-io/valkey-ci-agent (the detector defaults to 'unstable').
          TARGET_BRANCH: test-workflow
          RUN_ID: ${{ inputs.run_id || '' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && 'true' || 'false' }}
        run: |
          set -euo pipefail
          args=(
            -m scripts.test_failure_detector.main
            --token "${TARGET_TOKEN}"
            --repo "${TARGET_REPO}"
            --branch "${TARGET_BRANCH}"
            --verbose
          )

          if [[ -n "${RUN_ID}" ]]; then
            args+=(--run-id "${RUN_ID}")
          fi

          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi

          python "${args[@]}"
